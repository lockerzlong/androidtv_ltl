name: Auto Update Config Timestamp

on:
  push:
    paths:
      - 'background.png'

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update timestamp in config.json
        run: |
          # 1. Tạo số timestamp mới
          TIMESTAMP=$(date +%s)
          
          # 2. Cập nhật field "update" bằng jq
          jq ".update = \"$TIMESTAMP\"" config.json > temp.json
          
          # 3. Sử dụng Regex để tìm 'background' kèm theo bất kỳ số nào phía sau (nếu có) và thay bằng cái mới
          # Regex: background(/([0-9/]*))? tìm 'background' và các cụm /số/số... phía sau
          sed -i -E "s|content://tvlauncher.config/background(/[0-9/]+)?|content://tvlauncher.config/background/$TIMESTAMP|g" temp.json
          
          mv temp.json config.json
          
          echo "Updated config.json with timestamp $TIMESTAMP"

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add config.json
          git commit -m "Bot: Update background timestamp $TIMESTAMP" || exit 0
          git push
